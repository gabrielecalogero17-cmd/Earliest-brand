<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Man - CSS Art</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a15 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .scene {
            position: relative;
            width: 500px;
            height: 700px;
        }

        /* Glow behind */
        .glow-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0,170,255,0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        /* === HELMET === */
        .helmet {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 190px;
            z-index: 10;
        }

        .helmet-top {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 160px;
            background: linear-gradient(180deg, #c62828 0%, #b71c1c 40%, #8e0000 100%);
            border-radius: 75px 75px 60px 60px;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.4), 0 4px 15px rgba(0,0,0,0.6);
        }

        .helmet-faceplate {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 110px;
            background: linear-gradient(180deg, #e6a817 0%, #c49000 50%, #a07000 100%);
            border-radius: 20px 20px 50px 50px;
            clip-path: polygon(10% 0%, 90% 0%, 100% 30%, 95% 100%, 50% 110%, 5% 100%, 0% 30%);
            box-shadow: inset 0 -5px 15px rgba(0,0,0,0.3);
        }

        /* Eyes */
        .eye {
            position: absolute;
            top: 75px;
            width: 42px;
            height: 20px;
            background: #fff;
            box-shadow: 0 0 15px #4fc3f7, 0 0 30px #4fc3f7, 0 0 50px rgba(79,195,247,0.5);
            z-index: 12;
            animation: eyeFlicker 4s ease-in-out infinite;
        }

        .eye-left {
            left: 30px;
            border-radius: 2px 15px 2px 15px;
            transform: rotate(-8deg);
        }

        .eye-right {
            right: 30px;
            border-radius: 15px 2px 15px 2px;
            transform: rotate(8deg);
        }

        @keyframes eyeFlicker {
            0%, 90%, 100% { opacity: 1; box-shadow: 0 0 15px #4fc3f7, 0 0 30px #4fc3f7, 0 0 50px rgba(79,195,247,0.5); }
            95% { opacity: 0.3; box-shadow: 0 0 5px #4fc3f7; }
        }

        /* Mouth slit */
        .mouth {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 6px;
            display: flex;
            gap: 3px;
            z-index: 12;
        }

        .mouth-slit {
            flex: 1;
            height: 100%;
            background: #333;
            border-radius: 1px;
        }

        /* Chin */
        .chin {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 15px;
            background: linear-gradient(180deg, #c49000, #a07000);
            border-radius: 0 0 20px 20px;
            z-index: 11;
        }

        /* === NECK === */
        .neck {
            position: absolute;
            top: 200px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 30px;
            background: linear-gradient(180deg, #555 0%, #333 100%);
            border-radius: 0 0 10px 10px;
            z-index: 5;
        }

        /* === TORSO === */
        .torso {
            position: absolute;
            top: 220px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 230px;
            z-index: 6;
        }

        .chest-plate {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 230px;
            background: linear-gradient(180deg, #c62828 0%, #b71c1c 30%, #8e0000 100%);
            border-radius: 30px 30px 50px 50px;
            clip-path: polygon(15% 0%, 85% 0%, 100% 15%, 100% 85%, 80% 100%, 20% 100%, 0% 85%, 0% 15%);
            box-shadow: inset 0 -15px 30px rgba(0,0,0,0.4), 0 5px 20px rgba(0,0,0,0.5);
        }

        /* Arc Reactor */
        .arc-reactor {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            z-index: 8;
        }

        .arc-reactor-outer {
            position: absolute;
            top: 0; left: 0;
            width: 60px;
            height: 60px;
            border: 4px solid #b0bec5;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(79,195,247,0.1) 0%, transparent 70%);
        }

        .arc-reactor-mid {
            position: absolute;
            top: 10px; left: 10px;
            width: 40px;
            height: 40px;
            border: 3px solid #78909c;
            border-radius: 50%;
            background: transparent;
        }

        .arc-reactor-inner {
            position: absolute;
            top: 17px; left: 17px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffffff 0%, #4fc3f7 40%, #0288d1 100%);
            box-shadow: 0 0 20px #4fc3f7, 0 0 40px #4fc3f7, 0 0 80px rgba(79,195,247,0.6), 0 0 120px rgba(79,195,247,0.3);
            animation: reactorPulse 2s ease-in-out infinite;
        }

        @keyframes reactorPulse {
            0%, 100% { box-shadow: 0 0 20px #4fc3f7, 0 0 40px #4fc3f7, 0 0 80px rgba(79,195,247,0.6); }
            50% { box-shadow: 0 0 30px #4fc3f7, 0 0 60px #4fc3f7, 0 0 100px rgba(79,195,247,0.8), 0 0 150px rgba(79,195,247,0.4); }
        }

        /* Reactor lines */
        .reactor-line {
            position: absolute;
            background: rgba(79,195,247,0.4);
            z-index: 7;
        }

        .reactor-line-1 {
            top: 80px; left: 50%; transform: translateX(-50%);
            width: 2px; height: 100px;
        }

        .reactor-line-2 {
            top: 80px; left: 30%;
            width: 2px; height: 60px;
            transform: rotate(20deg);
        }

        .reactor-line-3 {
            top: 80px; right: 30%;
            width: 2px; height: 60px;
            transform: rotate(-20deg);
        }

        /* Abs section */
        .abs-plate {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 80px;
            z-index: 7;
        }

        .abs-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .abs-block {
            width: 38px;
            height: 18px;
            background: linear-gradient(180deg, #e6a817, #c49000);
            border-radius: 4px;
            box-shadow: inset 0 -2px 4px rgba(0,0,0,0.3);
        }

        /* === SHOULDERS === */
        .shoulder {
            position: absolute;
            top: 225px;
            width: 80px;
            height: 70px;
            background: linear-gradient(180deg, #c62828 0%, #b71c1c 50%, #8e0000 100%);
            border-radius: 40px 40px 20px 20px;
            z-index: 7;
            box-shadow: inset 0 -8px 15px rgba(0,0,0,0.4), 0 3px 10px rgba(0,0,0,0.5);
        }

        .shoulder-left { left: 55px; }
        .shoulder-right { right: 55px; }

        /* === ARMS === */
        .arm {
            position: absolute;
            top: 290px;
            width: 55px;
            height: 160px;
            z-index: 5;
        }

        .arm-left { left: 60px; }
        .arm-right { right: 60px; }

        .upper-arm {
            width: 55px;
            height: 80px;
            background: linear-gradient(180deg, #c62828, #8e0000);
            border-radius: 10px;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.3);
        }

        .elbow-joint {
            width: 40px;
            height: 15px;
            background: #555;
            border-radius: 5px;
            margin: 0 auto;
        }

        .forearm {
            width: 55px;
            height: 70px;
            background: linear-gradient(180deg, #e6a817, #a07000);
            border-radius: 10px 10px 15px 15px;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.3);
        }

        /* Hand repulsor */
        .hand {
            width: 40px;
            height: 25px;
            background: linear-gradient(180deg, #c62828, #8e0000);
            border-radius: 5px 5px 10px 10px;
            margin: 3px auto 0;
            position: relative;
        }

        .repulsor {
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #4fc3f7 50%, #0288d1 100%);
            box-shadow: 0 0 10px #4fc3f7, 0 0 25px rgba(79,195,247,0.5);
            animation: reactorPulse 2s ease-in-out infinite;
        }

        /* === WAIST === */
        .waist {
            position: absolute;
            top: 445px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: linear-gradient(180deg, #e6a817, #a07000);
            border-radius: 10px;
            z-index: 6;
            box-shadow: inset 0 -3px 8px rgba(0,0,0,0.3);
        }

        /* === LEGS === */
        .leg {
            position: absolute;
            top: 465px;
            width: 70px;
            height: 200px;
            z-index: 5;
        }

        .leg-left { left: 140px; }
        .leg-right { right: 140px; }

        .upper-leg {
            width: 70px;
            height: 90px;
            background: linear-gradient(180deg, #c62828, #8e0000);
            border-radius: 15px 15px 10px 10px;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.3);
        }

        .knee-joint {
            width: 50px;
            height: 15px;
            background: #555;
            border-radius: 8px;
            margin: 0 auto;
        }

        .lower-leg {
            width: 70px;
            height: 85px;
            background: linear-gradient(180deg, #c62828, #8e0000);
            border-radius: 10px 10px 15px 15px;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.3);
        }

        /* Boots */
        .boot {
            width: 80px;
            height: 35px;
            background: linear-gradient(180deg, #e6a817, #a07000);
            border-radius: 10px 10px 15px 15px;
            margin: 3px auto 0;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .boot-thruster {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 8px;
            border-radius: 0 0 10px 10px;
            background: radial-gradient(ellipse, #4fc3f7 0%, transparent 80%);
            box-shadow: 0 5px 20px rgba(79,195,247,0.4);
            animation: thrusterPulse 1.5s ease-in-out infinite;
        }

        @keyframes thrusterPulse {
            0%, 100% { opacity: 0.5; height: 8px; }
            50% { opacity: 1; height: 14px; }
        }

        /* Title */
        .title {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #e6a817;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(230,168,23,0.5), 0 0 40px rgba(230,168,23,0.3);
        }

        /* Particle effects */
        .particles {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #4fc3f7;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="scene">
        <div class="glow-bg"></div>

        <!-- Helmet -->
        <div class="helmet">
            <div class="helmet-top"></div>
            <div class="helmet-faceplate"></div>
            <div class="eye eye-left"></div>
            <div class="eye eye-right"></div>
            <div class="mouth">
                <div class="mouth-slit"></div>
                <div class="mouth-slit"></div>
                <div class="mouth-slit"></div>
                <div class="mouth-slit"></div>
                <div class="mouth-slit"></div>
            </div>
            <div class="chin"></div>
        </div>

        <!-- Neck -->
        <div class="neck"></div>

        <!-- Torso -->
        <div class="torso">
            <div class="chest-plate"></div>
            <div class="arc-reactor">
                <div class="arc-reactor-outer"></div>
                <div class="arc-reactor-mid"></div>
                <div class="arc-reactor-inner"></div>
            </div>
            <div class="reactor-line reactor-line-1"></div>
            <div class="reactor-line reactor-line-2"></div>
            <div class="reactor-line reactor-line-3"></div>
            <div class="abs-plate">
                <div class="abs-row">
                    <div class="abs-block"></div>
                    <div class="abs-block"></div>
                </div>
                <div class="abs-row">
                    <div class="abs-block"></div>
                    <div class="abs-block"></div>
                </div>
                <div class="abs-row">
                    <div class="abs-block"></div>
                    <div class="abs-block"></div>
                </div>
            </div>
        </div>

        <!-- Shoulders -->
        <div class="shoulder shoulder-left"></div>
        <div class="shoulder shoulder-right"></div>

        <!-- Arms -->
        <div class="arm arm-left">
            <div class="upper-arm"></div>
            <div class="elbow-joint"></div>
            <div class="forearm"></div>
            <div class="hand">
                <div class="repulsor"></div>
            </div>
        </div>
        <div class="arm arm-right">
            <div class="upper-arm"></div>
            <div class="elbow-joint"></div>
            <div class="forearm"></div>
            <div class="hand">
                <div class="repulsor"></div>
            </div>
        </div>

        <!-- Waist -->
        <div class="waist"></div>

        <!-- Legs -->
        <div class="leg leg-left">
            <div class="upper-leg"></div>
            <div class="knee-joint"></div>
            <div class="lower-leg"></div>
            <div class="boot">
                <div class="boot-thruster"></div>
            </div>
        </div>
        <div class="leg leg-right">
            <div class="upper-leg"></div>
            <div class="knee-joint"></div>
            <div class="lower-leg"></div>
            <div class="boot">
                <div class="boot-thruster"></div>
            </div>
        </div>

        <div class="title">Iron Man</div>
    </div>

    <script>
        // Create floating particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (4 + Math.random() * 6) + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            p.style.width = (2 + Math.random() * 3) + 'px';
            p.style.height = p.style.width;
            container.appendChild(p);
        }
    </script>
</body>
</html>
